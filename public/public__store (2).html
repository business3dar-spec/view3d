<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Store — View3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --cream:#FAF7F2; --surface:#FFFFFF; --ink:#3A2E26; --ink-soft:#6B5D52;
    --oak:#8B6F4E; --oak-deep:#6F5538; --sage:#6B8F71; --sage-deep:#52735A;
    --line:#E8E1D6; --line-soft:#F0EBE2;
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  a{color:inherit;}

  header{position:sticky;top:0;z-index:50;background:rgba(250,247,242,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:1.1rem 2rem;}
  .header-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .back-link{color:var(--ink-soft);text-decoration:none;font-size:.85rem;font-weight:500;}
  .back-link:hover{color:var(--ink);}
  .logo{font-family:var(--serif);font-weight:600;font-size:1.15rem;margin-left:auto;}

  /* ── Store profile header ─────────────────────────────── */
  .profile{max-width:1140px;margin:0 auto;padding:3rem 2rem 2.5rem;}
  .profile-top{display:flex;align-items:flex-start;gap:1.5rem;flex-wrap:wrap;}
  .avatar{width:76px;height:76px;border-radius:4px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:500;font-size:1.9rem;color:#fff;flex-shrink:0;}
  .profile-text{flex:1;min-width:220px;}
  .store-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-deep);margin-bottom:.5rem;}
  .store-name{font-family:var(--serif);font-size:2.2rem;font-weight:500;line-height:1.12;letter-spacing:-.01em;margin-bottom:.6rem;}
  .store-bio{color:var(--ink-soft);font-size:.95rem;line-height:1.6;max-width:540px;margin-bottom:1rem;}
  .meta-tags{display:flex;gap:1.5rem;flex-wrap:wrap;}
  .meta-tag{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--ink-soft);}
  .meta-tag .ic{color:var(--oak-deep);font-size:.9rem;}

  .profile-stats{display:flex;gap:2rem;margin-top:1.75rem;padding-top:1.4rem;border-top:1px solid var(--line);}
  .stat{font-size:.8rem;color:var(--ink-soft);}
  .stat b{font-family:var(--serif);color:var(--ink);font-weight:600;font-size:1.2rem;display:block;}

  main{max-width:1140px;margin:0 auto;padding:0 2rem 5rem;}
  .section-label{font-family:var(--serif);font-size:1.3rem;font-weight:500;margin-bottom:1.4rem;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.75rem;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .25s, transform .25s;}
  .card:hover{box-shadow:0 18px 40px -12px rgba(58,46,38,.18);transform:translateY(-3px);}

  .card-media{height:230px;background:var(--line-soft);position:relative;}
  .card-media model-viewer{width:100%;height:100%;--poster-color:transparent;}
  .ar-badge{position:absolute;top:.75rem;right:.75rem;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--oak-deep);box-shadow:0 2px 6px rgba(0,0,0,.08);}

  .card-body{padding:1.15rem 1.25rem 1.35rem;display:flex;flex-direction:column;gap:.4rem;}
  .card-name{font-family:var(--serif);font-size:1.05rem;font-weight:500;line-height:1.3;}
  .card-desc{font-size:.78rem;color:var(--ink-soft);line-height:1.5;}
  .card-price{font-family:var(--serif);font-weight:600;font-size:1.15rem;color:var(--ink);margin-top:.1rem;}

  .ar-cta{
    margin-top:.6rem;width:100%;border:none;border-radius:3px;
    background:var(--sage);color:#fff;font-weight:600;font-size:.82rem;
    padding:.7rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;
    transition:background .2s;
  }
  .ar-cta:hover{background:var(--sage-deep);}

  .view-link{text-align:center;font-size:.76rem;color:var(--ink-soft);text-decoration:none;margin-top:.5rem;display:block;}
  .view-link:hover{color:var(--oak-deep);}

  .empty-state{text-align:center;padding:5rem 1rem;color:var(--ink-soft);}
  .empty-state .icon{font-size:2.2rem;margin-bottom:1rem;opacity:.6;}

  @media (max-width:640px){
    .profile{padding:2rem 1.5rem 1.75rem;}
    .store-name{font-size:1.6rem;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;}
    .card-media{height:160px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Marketplace</a>
    <div class="logo">View3D</div>
  </div>
</header>

<script>
  const COMPANY = __COMPANY_DATA__;
  const PRODUCTS = __PRODUCTS_DATA__;
</script>

<div class="profile">
  <div class="profile-top">
    <div class="avatar" id="avatar"></div>
    <div class="profile-text">
      <div class="store-eyebrow">Showcase</div>
      <div class="store-name" id="store-name"></div>
      <p class="store-bio" id="store-bio"></p>
      <div class="meta-tags" id="meta-tags"></div>
    </div>
  </div>
  <div class="profile-stats">
    <div class="stat"><b id="stat-count">0</b>Products</div>
    <div class="stat"><b>3D &amp; AR</b>Every item</div>
  </div>
</div>

<main>
  <div class="section-label">All products</div>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <div class="icon">◯</div>
    <p>This store hasn't added any products yet.</p>
  </div>
</main>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script>
  document.title = COMPANY.name + ' — View3D Store';
  document.getElementById('avatar').textContent = COMPANY.name.charAt(0).toUpperCase();
  document.getElementById('store-name').textContent = COMPANY.name;
  document.getElementById('store-bio').textContent = COMPANY.bio || 'Browse our full catalog in interactive 3D and augmented reality.';
  document.getElementById('stat-count').textContent = PRODUCTS.length;

  const tagsEl = document.getElementById('meta-tags');
  let tagsHtml = '';
  if (COMPANY.address) tagsHtml += `<span class="meta-tag"><span class="ic">⌖</span>${COMPANY.address}</span>`;
  if (COMPANY.phone)   tagsHtml += `<span class="meta-tag"><span class="ic">☎</span>${COMPANY.phone}</span>`;
  tagsEl.innerHTML = tagsHtml;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (PRODUCTS.length === 0) {
    empty.style.display = 'block';
  } else {
    grid.innerHTML = PRODUCTS.map(p => {
      const priceLabel = p.price > 0 ? `$${parseFloat(p.price).toFixed(2)}` : 'Price on inquiry';
      const desc = (p.description || '').slice(0, 90);
      return `
      <div class="card">
        <div class="card-media">
          <model-viewer
            src="${p.model_url}"
            ${p.image_url ? `poster="${p.image_url}"` : ''}
            alt="${p.name}"
            camera-controls
            auto-rotate
            ar
            ar-modes="webxr scene-viewer quick-look"
            shadow-intensity="1"
            environment-image="neutral"
            disable-zoom
          ></model-viewer>
          <div class="ar-badge">AR</div>
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${desc}</div>
          <div class="card-price">${priceLabel}</div>
          <button class="ar-cta" onclick="launchAR(this)">View in Your Space</button>
          <a href="/product/${p.id}" class="view-link">Full details →</a>
        </div>
      </div>
    `;
    }).join('');
  }

  function launchAR(btn) {
    const card = btn.closest('.card');
    const mv = card.querySelector('model-viewer');
    if (mv && typeof mv.activateAR === 'function') mv.activateAR();
  }
</script>
</body>
</html>
