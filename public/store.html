<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Store — View3D</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f5f4f2; --surface:#ffffff; --ink:#1b1b1f; --muted:#6b6b75;
    --line:#e6e4e1; --accent:#2f6b3f; --badge:#2f6b3f;
  }
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}

  header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line);padding:.7rem 1rem;}
  .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .back-link{color:var(--muted);font-size:.82rem;font-weight:600;}
  .logo{font-weight:800;font-size:1.05rem;margin-left:auto;}

  .cover{height:120px;background:linear-gradient(135deg,#e6e4e1,#d8d5d0);position:relative;}
  .cover img{width:100%;height:100%;object-fit:cover;}

  .profile{max-width:1200px;margin:0 auto;padding:0 1rem;position:relative;}
  .profile-top{display:flex;align-items:flex-end;gap:.9rem;padding-top:.7rem;margin-top:-32px;}
  .avatar{width:62px;height:62px;border-radius:10px;background:var(--ink);border:3px solid var(--surface);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.5rem;color:#fff;flex-shrink:0;}
  .profile-text{flex:1;padding-bottom:.3rem;min-width:0;}
  .store-name{font-size:1.15rem;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .biz-type-tag{display:inline-block;font-size:.68rem;font-weight:700;color:var(--accent);background:#e8f1ea;padding:.15rem .5rem;border-radius:5px;margin-top:.25rem;}

  .store-meta-block{padding:.8rem 0 1rem;}
  .store-bio{font-size:.84rem;color:var(--muted);line-height:1.55;margin-bottom:.6rem;}
  .meta-tags{display:flex;gap:1.1rem;flex-wrap:wrap;}
  .meta-tag{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;}
  .meta-tag .ic{color:var(--accent);}

  .stats-row{display:flex;gap:1.5rem;padding:.7rem 0;border-top:1px solid var(--line);margin-top:.4rem;}
  .stat{font-size:.76rem;color:var(--muted);}
  .stat b{display:block;font-size:1rem;font-weight:800;color:var(--ink);}

  main{max-width:1200px;margin:0 auto;padding:.5rem .9rem 4rem;}
  .section-title{font-size:.92rem;font-weight:800;margin-bottom:.65rem;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem;}
  @media (min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:820px){ .grid{grid-template-columns:repeat(4,1fr);} }
  @media (min-width:1080px){ .grid{grid-template-columns:repeat(5,1fr);} }

  .card{background:var(--surface);border:1px solid var(--line);border-radius:9px;overflow:hidden;display:flex;flex-direction:column;}
  .card-media{aspect-ratio:1/1;background:#eeece8;position:relative;}
  .card-media model-viewer{width:100%;height:100%;--poster-color:transparent;}
  .badge-row{position:absolute;top:.4rem;left:.4rem;display:flex;gap:.3rem;}
  .badge{font-size:.6rem;font-weight:800;padding:.18rem .4rem;border-radius:4px;color:#fff;}
  .badge.b3d{background:var(--badge);}
  .badge.bar{background:#1b1b1f;}

  .card-body{padding:.55rem .6rem .55rem;display:flex;flex-direction:column;gap:.18rem;}
  .card-price{font-weight:800;font-size:.92rem;}
  .card-name{font-size:.78rem;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .ar-cta{
    margin:.1rem .6rem .6rem;border:none;border-radius:6px;background:var(--accent);color:#fff;
    font-weight:700;font-size:.74rem;padding:.5rem;cursor:pointer;
  }
  .view-link{display:block;text-align:center;font-size:.7rem;color:var(--muted);padding-bottom:.5rem;}

  .empty-state{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
  .empty-state .icon{font-size:2rem;margin-bottom:.75rem;opacity:.5;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Marketplace</a>
    <div class="logo">View3D</div>
  </div>
</header>

<script>
  const COMPANY = __COMPANY_DATA__;
  const PRODUCTS = __PRODUCTS_DATA__;
</script>

<div class="cover" id="cover"></div>

<div class="profile">
  <div class="profile-top">
    <div class="avatar" id="avatar"></div>
    <div class="profile-text">
      <div class="store-name" id="store-name"></div>
      <div class="biz-type-tag" id="biz-type-tag"></div>
    </div>
  </div>
  <div class="store-meta-block">
    <p class="store-bio" id="store-bio"></p>
    <div class="meta-tags" id="meta-tags"></div>
  </div>
  <div class="stats-row">
    <div class="stat"><b id="stat-count">0</b>Products</div>
    <div class="stat"><b>3D &amp; AR</b>Every item</div>
  </div>
</div>

<main>
  <div class="section-title">All products</div>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <div class="icon">◯</div>
    <p>This business hasn't added any products yet.</p>
  </div>
</main>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script>
  const TYPE_LABELS = {
    restaurant: '🍽 Restaurant', furniture: '🪑 Furniture Store', electronics: '📱 Electronics Store',
    fashion: '👗 Fashion Store', lighting: '💡 Lighting Store', other: '📦 Business'
  };

  document.title = COMPANY.name + ' — View3D';
  document.getElementById('avatar').textContent = COMPANY.name.charAt(0).toUpperCase();
  document.getElementById('store-name').textContent = COMPANY.name;
  document.getElementById('biz-type-tag').textContent = TYPE_LABELS[COMPANY.business_type] || '📦 Business';
  document.getElementById('store-bio').textContent = COMPANY.bio || 'Browse the full catalog in interactive 3D and augmented reality.';
  document.getElementById('stat-count').textContent = PRODUCTS.length;

  if (COMPANY.cover_url) {
    document.getElementById('cover').innerHTML = '<img src="' + COMPANY.cover_url + '" alt="" />';
  }

  const tagsEl = document.getElementById('meta-tags');
  let tagsHtml = '';
  if (COMPANY.address) tagsHtml += '<span class="meta-tag"><span class="ic">⌖</span>' + COMPANY.address + '</span>';
  if (COMPANY.phone)   tagsHtml += '<span class="meta-tag"><span class="ic">☎</span>' + COMPANY.phone + '</span>';
  tagsEl.innerHTML = tagsHtml;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (PRODUCTS.length === 0) {
    empty.style.display = 'block';
  } else {
    grid.innerHTML = PRODUCTS.map(function(p) {
      const priceLabel = p.price > 0 ? '$' + parseFloat(p.price).toFixed(2) : 'Inquire';
      const hasModel = !!p.model_url;
      const mediaHtml = hasModel
        ? '<model-viewer src="' + p.model_url + '" ' + (p.image_url ? 'poster="' + p.image_url + '"' : '') + ' alt="' + p.name + '" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" shadow-intensity="1" environment-image="neutral" disable-zoom></model-viewer>'
        : (p.image_url ? '<img src="' + p.image_url + '" alt="' + p.name + '" style="width:100%;height:100%;object-fit:cover;" />' : '');
      return (
        '<div class="card">' +
          '<div class="card-media">' + mediaHtml +
            '<div class="badge-row">' +
              (hasModel ? '<span class="badge b3d">3D</span><span class="badge bar">AR</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-price">' + priceLabel + '</div>' +
            '<div class="card-name">' + p.name + '</div>' +
          '</div>' +
          (hasModel ? '<button class="ar-cta" onclick="launchAR(this)">View in Your Space</button>' : '') +
          '<a href="/product/' + p.id + '" class="view-link">Full details →</a>' +
        '</div>'
      );
    }).join('');
  }

  function launchAR(btn) {
    const card = btn.closest('.card');
    const mv = card.querySelector('model-viewer');
    if (mv && typeof mv.activateAR === 'function') mv.activateAR();
  }
</script>
</body>
</html>
