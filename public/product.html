<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — View3D</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f5f4f2; --surface:#ffffff; --ink:#1b1b1f; --muted:#6b6b75;
    --line:#e6e4e1; --accent:#2f6b3f; --badge:#2f6b3f;
  }
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}

  header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line);padding:.7rem 1rem;}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .back-link{color:var(--muted);font-size:.82rem;font-weight:600;}
  .logo{font-weight:800;font-size:1.05rem;margin-left:auto;}

  main{max-width:1100px;margin:0 auto;padding:1.2rem .9rem 4rem;}
  .layout{display:grid;grid-template-columns:1.15fr 1fr;gap:1.75rem;}
  @media (max-width:760px){.layout{grid-template-columns:1fr;gap:1rem;}}

  .viewer-box{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative;}
  model-viewer{width:100%;height:380px;background:#eeece8;}
  .badge-row{position:absolute;top:.7rem;left:.7rem;display:flex;gap:.35rem;z-index:2;}
  .badge{font-size:.66rem;font-weight:800;padding:.2rem .45rem;border-radius:5px;color:#fff;}
  .badge.b3d{background:var(--badge);}
  .badge.bar{background:#1b1b1f;}
  .viewer-controls{padding:.7rem .9rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;}
  .hint{font-size:.74rem;color:var(--muted);}
  .ar-btn{background:var(--accent);color:#fff;border:none;padding:.5rem 1.1rem;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;}

  .info{display:flex;flex-direction:column;}
  .store-link{font-size:.82rem;color:var(--accent);font-weight:700;margin-bottom:.6rem;display:inline-block;}
  .product-name{font-size:1.35rem;font-weight:800;line-height:1.25;margin-bottom:.5rem;}
  .price{font-size:1.5rem;font-weight:800;margin-bottom:.9rem;}
  .desc{color:var(--muted);font-size:.88rem;line-height:1.65;margin-bottom:1.1rem;}
  .category-tag{display:inline-block;background:#e8f1ea;color:var(--accent);font-size:.72rem;font-weight:700;padding:.3rem .7rem;border-radius:6px;margin-bottom:1.1rem;width:fit-content;}

  .contact-box{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:1rem 1.1rem;margin-top:auto;}
  .contact-box h3{font-size:.88rem;font-weight:800;margin-bottom:.4rem;}
  .contact-box p{font-size:.82rem;color:var(--muted);line-height:1.55;}
  .contact-box a{color:var(--accent);font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Marketplace</a>
    <div class="logo">View3D</div>
  </div>
</header>

<script>const PRODUCT = __PRODUCT_DATA__;</script>

<main>
  <div class="layout">
    <div class="viewer-box">
      <div class="badge-row">
        <span class="badge b3d">3D</span>
        <span class="badge bar">AR</span>
      </div>
      <model-viewer id="mv" src="" alt="" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
      <div class="viewer-controls">
        <span class="hint">Drag to rotate · Scroll to zoom</span>
        <button class="ar-btn" id="ar-btn" style="display:none;">View in AR</button>
      </div>
    </div>

    <div class="info">
      <a id="store-link" href="#" class="store-link"></a>
      <div class="category-tag" id="cat-tag"></div>
      <h1 class="product-name" id="p-name"></h1>
      <div class="price" id="p-price"></div>
      <p class="desc" id="p-desc"></p>

      <div class="contact-box">
        <h3>Interested in this product?</h3>
        <p id="contact-text">Visit the seller's page to see their full catalog and contact details.</p>
      </div>
    </div>
  </div>
</main>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script>
  const CATEGORY_LABELS = {
    furniture: 'Furniture', restaurant: 'Restaurant Food', electronics: 'Electronics',
    lighting: 'Lighting', fashion: 'Fashion', other: 'Other'
  };

  document.title = PRODUCT.name + ' — View3D';
  document.getElementById('p-name').textContent = PRODUCT.name;
  document.getElementById('p-desc').textContent = PRODUCT.description || 'No description provided.';
  document.getElementById('p-price').textContent = PRODUCT.price > 0 ? '$' + parseFloat(PRODUCT.price).toFixed(2) : 'Price on inquiry';
  document.getElementById('cat-tag').textContent = CATEGORY_LABELS[PRODUCT.category] || 'Other';
  document.getElementById('store-link').textContent = 'Sold by ' + PRODUCT.company_name + ' →';
  document.getElementById('store-link').href = '/' + PRODUCT.company_slug;
  document.getElementById('contact-text').innerHTML = 'Visit <a href="/' + PRODUCT.company_slug + '">' + PRODUCT.company_name + '\'s page</a> to see their full catalog.';

  const mv = document.getElementById('mv');
  mv.setAttribute('src', PRODUCT.model_url);
  mv.setAttribute('alt', PRODUCT.name);
  if (PRODUCT.image_url) mv.setAttribute('poster', PRODUCT.image_url);

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const arBtn = document.getElementById('ar-btn');

  if (isIOS) {
    arBtn.style.display = 'inline-block';
    arBtn.onclick = function() { mv.activateAR(); };
  } else if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(function(supported) {
      if (supported) { arBtn.style.display = 'inline-block'; arBtn.onclick = function() { mv.activateAR(); }; }
    }).catch(function() {});
  }
</script>
</body>
</html>
