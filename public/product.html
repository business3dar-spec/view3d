<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — View3D</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0f; --surface:#13131a; --border:#222230;
    --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8f0; --muted:#7a7a9a;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}

  header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 1.5rem;}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .back-link{color:var(--muted);text-decoration:none;font-size:.875rem;display:flex;align-items:center;gap:.4rem;}
  .back-link:hover{color:var(--text);}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-left:auto;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .layout{display:grid;grid-template-columns:1.1fr 1fr;gap:2.5rem;}
  @media (max-width:800px){.layout{grid-template-columns:1fr;gap:1.5rem;}}

  .viewer-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  model-viewer{width:100%;height:420px;background:var(--bg);}
  .viewer-controls{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
  .hint{font-size:.75rem;color:var(--muted);}
  .ar-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.45rem 1.1rem;border-radius:6px;font-size:.8rem;font-weight:500;cursor:pointer;}

  .info{display:flex;flex-direction:column;}
  .store-link{font-size:.8rem;color:var(--accent2);text-decoration:none;margin-bottom:.6rem;display:inline-block;}
  .product-name{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;line-height:1.2;margin-bottom:.6rem;}
  .price{font-family:'Syne',sans-serif;font-size:2.1rem;font-weight:800;color:var(--accent2);margin-bottom:1.2rem;}
  .desc{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:1.5rem;}
  .category-tag{display:inline-block;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);color:var(--accent);font-size:.75rem;padding:.3rem .7rem;border-radius:6px;margin-bottom:1.2rem;width:fit-content;}

  .contact-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;margin-top:auto;}
  .contact-box h3{font-size:.85rem;font-weight:600;margin-bottom:.4rem;}
  .contact-box p{font-size:.8rem;color:var(--muted);line-height:1.5;}
  .contact-box a{color:var(--accent2);}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Marketplace</a>
    <div class="logo">View3D</div>
  </div>
</header>

<script>const PRODUCT = __PRODUCT_DATA__;</script>

<main>
  <div class="layout">
    <div class="viewer-box">
      <model-viewer id="mv" src="" alt="" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
      <div class="viewer-controls">
        <span class="hint">🖱 Drag to rotate · Scroll to zoom</span>
        <button class="ar-btn" id="ar-btn" style="display:none;">📱 View in AR</button>
      </div>
    </div>

    <div class="info">
      <a id="store-link" href="#" class="store-link"></a>
      <div class="category-tag" id="cat-tag"></div>
      <h1 class="product-name" id="p-name"></h1>
      <div class="price" id="p-price"></div>
      <p class="desc" id="p-desc"></p>

      <div class="contact-box">
        <h3>Interested in this product?</h3>
        <p id="contact-text">Visit the seller's store page to see their full catalog and contact details.</p>
      </div>
    </div>
  </div>
</main>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script>
  const CATEGORY_LABELS = {
    furniture: '🪑 Furniture', fashion: '👗 Fashion', shoes: '👟 Shoes',
    electronics: '📱 Electronics', jewelry: '💎 Jewelry', toys: '🧸 Toys',
    home: '🏠 Home', other: '📦 Other'
  };

  document.title = PRODUCT.name + ' — View3D';
  document.getElementById('p-name').textContent = PRODUCT.name;
  document.getElementById('p-desc').textContent = PRODUCT.description || 'No description provided.';
  document.getElementById('p-price').textContent = PRODUCT.price > 0 ? '$' + parseFloat(PRODUCT.price).toFixed(2) : 'Price on inquiry';
  document.getElementById('cat-tag').textContent = CATEGORY_LABELS[PRODUCT.category] || '📦 Other';
  document.getElementById('store-link').textContent = `Sold by ${PRODUCT.company_name} →`;
  document.getElementById('store-link').href = `/store/${PRODUCT.company_slug}`;
  document.getElementById('contact-text').innerHTML = `Visit <a href="/store/${PRODUCT.company_slug}" style="color:var(--accent2)">${PRODUCT.company_name}'s store</a> to see their full catalog.`;

  const mv = document.getElementById('mv');
  mv.setAttribute('src', PRODUCT.model_url);
  mv.setAttribute('alt', PRODUCT.name);
  if (PRODUCT.image_url) mv.setAttribute('poster', PRODUCT.image_url);

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const arBtn = document.getElementById('ar-btn');

  if (isIOS) {
    arBtn.style.display = 'inline-block';
    arBtn.onclick = () => mv.activateAR();
  } else if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(supported => {
      if (supported) { arBtn.style.display = 'inline-block'; arBtn.onclick = () => mv.activateAR(); }
    }).catch(() => {});
  }
</script>
</body>
</html>
