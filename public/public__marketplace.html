<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>View3D Marketplace — Shop in 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0f; --surface:#13131a; --border:#222230;
    --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8f0; --muted:#7a7a9a;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}

  /* Header */
  header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
  .header-inner{max-width:1200px;margin:0 auto;padding:1rem 1.5rem;display:flex;align-items:center;gap:1.5rem;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .search-bar{flex:1;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;gap:.5rem;}
  .search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:.875rem;width:100%;font-family:'Inter',sans-serif;}
  .search-bar input::placeholder{color:var(--muted);}
  .sell-link{font-size:.825rem;color:var(--accent2);text-decoration:none;white-space:nowrap;border:1px solid rgba(0,212,170,.3);padding:.5rem .9rem;border-radius:7px;flex-shrink:0;}

  /* Category rail */
  .cat-rail{display:flex;gap:.6rem;overflow-x:auto;padding:.9rem 1.5rem;max-width:1200px;margin:0 auto;scrollbar-width:none;}
  .cat-rail::-webkit-scrollbar{display:none;}
  .cat-pill{flex-shrink:0;font-size:.8rem;font-weight:500;padding:.45rem 1rem;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .cat-pill:hover:not(.active){border-color:var(--accent);color:var(--text);}
  .cat-count{opacity:.6;font-size:.75rem;margin-left:.3rem;}

  main{max-width:1200px;margin:0 auto;padding:0 1.5rem 4rem;}

  .hero-strip{padding:1.5rem 0 .5rem;}
  .hero-strip h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:.3rem;}
  .hero-strip p{color:var(--muted);font-size:.9rem;}

  /* Product grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.1rem;margin-top:1.5rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;text-decoration:none;color:var(--text);display:flex;flex-direction:column;transition:border-color .2s, transform .2s;}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .card-media{height:180px;background:#0e0e14;position:relative;overflow:hidden;}
  .card-media img,.card-media model-viewer{width:100%;height:100%;object-fit:cover;}
  .card-badge{position:absolute;top:.6rem;left:.6rem;background:rgba(108,99,255,.9);color:#fff;font-size:.65rem;font-weight:600;padding:.2rem .55rem;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;}
  .card-body{padding:.85rem .95rem 1rem;display:flex;flex-direction:column;gap:.3rem;flex:1;}
  .card-store{font-size:.7rem;color:var(--accent2);font-weight:500;}
  .card-name{font-size:.9rem;font-weight:600;line-height:1.3;}
  .card-desc{font-size:.75rem;color:var(--muted);line-height:1.4;flex:1;}
  .card-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem;}
  .card-price{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--accent2);}
  .card-cta{font-size:.7rem;color:var(--muted);}

  .empty-state{text-align:center;padding:4rem 1rem;color:var(--muted);}
  .empty-state .icon{font-size:2.5rem;margin-bottom:1rem;}

  footer{border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:.8rem;color:var(--muted);}

  @media (max-width:640px){
    .header-inner{flex-wrap:wrap;}
    .sell-link{order:3;width:100%;text-align:center;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem;}
    .card-media{height:140px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">View3D</div>
    <div class="search-bar">
      <span style="color:var(--muted);font-size:.85rem;">🔍</span>
      <input type="text" id="search-input" placeholder="Search products…" />
    </div>
    <a href="/#sell" class="sell-link" onclick="return showSellInfo()">Sell on View3D</a>
  </div>
  <div class="cat-rail" id="cat-rail">
    <div class="cat-pill active" data-cat="all">All</div>
  </div>
</header>

<main>
  <div class="hero-strip">
    <h1 id="page-title">Browse all products</h1>
    <p id="page-subtitle">Rotate, zoom, and view every item in 3D before you decide.</p>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <div class="icon">🛍️</div>
    <p>No products yet in this category.</p>
  </div>
</main>

<footer>© 2026 View3D Marketplace · A 3D shopping experience</footer>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script>
  const CATEGORY_LABELS = {
    furniture: '🪑 Furniture', fashion: '👗 Fashion', shoes: '👟 Shoes',
    electronics: '📱 Electronics', jewelry: '💎 Jewelry', toys: '🧸 Toys',
    home: '🏠 Home', other: '📦 Other'
  };

  let allProducts = [];
  let currentCategory = 'all';

  async function loadCategories() {
    const res = await fetch('/api/categories');
    const data = await res.json();
    const rail = document.getElementById('cat-rail');
    data.categories.forEach(c => {
      const pill = document.createElement('div');
      pill.className = 'cat-pill';
      pill.dataset.cat = c.category;
      pill.innerHTML = `${CATEGORY_LABELS[c.category] || c.category} <span class="cat-count">${c.count}</span>`;
      pill.addEventListener('click', () => selectCategory(c.category, pill));
      rail.appendChild(pill);
    });
  }

  function selectCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    loadProducts();
  }

  document.querySelector('.cat-pill[data-cat="all"]').addEventListener('click', (e) => selectCategory('all', e.target));

  async function loadProducts() {
    const url = currentCategory === 'all' ? '/api/products' : `/api/products?category=${currentCategory}`;
    const res = await fetch(url);
    const data = await res.json();
    allProducts = data.products;
    renderGrid(allProducts);
  }

  function renderGrid(products) {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (products.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = products.map(p => `
      <a href="/product/${p.id}" class="card">
        <div class="card-media">
          <span class="card-badge">${CATEGORY_LABELS[p.category]?.split(' ')[0] || '📦'} 3D</span>
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy" />` : `<model-viewer src="${p.model_url}" auto-rotate camera-controls environment-image="neutral" disable-zoom></model-viewer>`}
        </div>
        <div class="card-body">
          <div class="card-store">${p.company_name}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${(p.description || '').slice(0,70)}</div>
          <div class="card-price-row">
            <div class="card-price">${p.price > 0 ? '$' + parseFloat(p.price).toFixed(2) : 'Inquire'}</div>
            <div class="card-cta">View in 3D →</div>
          </div>
        </div>
      </a>
    `).join('');
  }

  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(q) || p.company_name.toLowerCase().includes(q));
    renderGrid(filtered);
  });

  function showSellInfo() {
    alert('To sell on View3D, message our Telegram bot and send: /register Your Company Name');
    return false;
  }

  loadCategories();
  loadProducts();
</script>
</body>
</html>
